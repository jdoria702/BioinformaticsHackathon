<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bioinformatics Chat Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
</head>
<body>
    <header class="navbar">
        <a href="/" class="navbar-home-link">
            <div class="navbar-brand">
                <img src="{{ url_for('static', filename='images/BioinfoAIIcon.png') }}" alt="BioinfoAI icon" class="navbar-icon">
                <span class="navbar-title">BioinfoAI</span>
            </div>
        </a>
    </header>
    <main class="app-layout">
        <section class="chat-panel">
            <div class="chat-container" id="chat-container">
                <div class="message assistant" id="welcome-message">Welcome to BioinfoAI! How can I help you today?</div>
                <div id="suggested-prompts" class="suggested-prompts"></div>
            </div>
            <div class="notification-container" id="notification-container"></div>
            <div class="upload-actions" id="upload-actions" style="display: none;">
                <button id="confirm-upload-button" type="button">Upload</button>
                <button id="cancel-upload-button" type="button">Cancel</button>
            </div>
            <div class="input-container">
                <input type="text" id="message-input" placeholder="Type your message here...">
                <input 
                    type="file" 
                    id="file-input"
                    accept=".png,.jpg,.jpeg,.tif,.tiff,.bmp,.pdf,.docx"
                    style="display: none;"
                >
                <button id="send-button">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="19" x2="12" y2="5"></line>
                        <polyline points="5 12 12 5 19 12"></polyline>
                    </svg>
                </button>
                <button id="upload-button" type="button" aria-label="Upload file">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                </button>
                <button id="session-files-button" type="button" aria-label="View files">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="8" y1="13" x2="16" y2="13"></line>
                        <line x1="8" y1="17" x2="16" y2="17"></line>
                    </svg>
                </button>
            </div>
        </section>
    </main>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const notificationContainer = document.getElementById('notification-container')
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        let firstMessageSent = false;
        const urlParams = new URLSearchParams(window.location.search);
        const selectedTopic = urlParams.get('topic') || 'sequence_alignment';
        let sessionId = sessionStorage.getItem('bio_session_id')
        const fileInput = document.getElementById('file-input');
        const uploadButton = document.getElementById('upload-button');
        const uploadActions = document.getElementById('upload-actions');
        const confirmUploadButton = document.getElementById('confirm-upload-button');
        const cancelUploadButton = document.getElementById('cancel-upload-button');
        const sessionFilesButton = document.getElementById('session-files-button');
        
        const promptSuggestions = {
            genome_assembly: [
                "What is genome assembly?",
                "What is the difference between de novo and reference-guided assembly?",
                "Why are contigs and scaffolds important?",
                "What challenges make genome assembly difficult?"
            ],
            sequence_alignment: [
                "What is sequence alignment?",
                "What is the difference between global and local alignment?",
                "How does the Needleman-Wunsch algorithm work?",
                "Why are gaps used in sequence alignment?"
            ],
            variant_calling: [
                "What is variant calling?",
                "What is the difference between SNPs and indels?",
                "How do sequencing errors affect variant calling?",
                "What does read depth mean in variant calling?"
            ],
            transcriptomics: [
                "What is transcriptomics?",
                "What can RNA-seq tell us?",
                "What is differential gene expression?",
                "Why is normalization important in transcriptomics?"
            ],
            protein_structure: [
                "What is protein structure?",
                "What are the four levels of protein structure?",
                "Why does protein folding matter?",
                "How do scientists predict protein structure?"
            ],
            phylogenetics: [
                "What is phylogenetics?",
                "How are phylogenetic trees built?",
                "What is the difference between rooted and unrooted trees?",
                "Why is multiple sequence alignment important for phylogenetics?"
            ]
        };

        if (!sessionId) {
            sessionId = crypto.randomUUID();
            sessionStorage.setItem('bio_session_id', sessionId);
        }

        const readableTopic = selectedTopic
            .replace(/_/g, ' ')
            .replace(/\b\w/g, (char) => char.toUpperCase());

        const dynamicTitle = `What would you like to learn about ${readableTopic}?`;

        const welcomeMessage = document.getElementById('welcome-message');
        if (welcomeMessage) {
            welcomeMessage.textContent = dynamicTitle;
        }
        renderSuggestedPrompts();

        uploadButton.addEventListener('click', () => {
            fileInput.value = '';
            fileInput.click();
        })

        fileInput.addEventListener('change', async () => {
            const file = fileInput.files[0];
            if (!file) return;

            notificationContainer.textContent = `Would you like to upload: ${file.name}`;
            uploadActions.style.display = 'flex';
        })

        confirmUploadButton.addEventListener('click', async () => {
            uploadActions.style.display = 'none';
            await uploadImage();
        });

        cancelUploadButton.addEventListener('click', () => {
            fileInput.value = '';
            notificationContainer.textContent = 'Upload canceled.';
            uploadActions.style.display = 'none';
        });

        sessionFilesButton.addEventListener('click', async () => {
            const existing = document.getElementById('session-files-modal-overlay');
            if (existing) {
                existing.remove();
            }

            try {
                const response = await fetch(`/api/session/files?session_id=${encodeURIComponent(sessionId)}`);
                const data = await response.json();

                if (!response.ok) {
                    const message = data.error || 'Failed to fetch session files.';
                    notificationContainer.textContent = message;
                    return;
                }

                const files = Array.isArray(data.files) ? data.files : [];
                openSessionFilesModal(files);
            } catch (error) {
                notificationContainer.textContent = 'Failed to fetch session files.';
            }
        })

        function openSessionFilesModal(files) {
            const overlay = document.createElement('div');
            overlay.id = 'session-files-modal-overlay';
            overlay.style.position = 'fixed';
            overlay.style.inset = '0';
            overlay.style.backgroundColor = 'rgba(0, 0, 0, 0.55)';
            overlay.style.display = 'flex';
            overlay.style.alignItems = 'center';
            overlay.style.justifyContent = 'center';
            overlay.style.zIndex = '1000';

            const modal = document.createElement('div');
            modal.style.width = 'min(92vw, 560px)';
            modal.style.maxHeight = '70vh';
            modal.style.overflowY = 'auto';
            modal.style.backgroundColor = '#131a35';
            modal.style.border = '1px solid rgba(255, 255, 255, 0.15)';
            modal.style.borderRadius = '16px';
            modal.style.padding = '18px';
            modal.style.color = '#ffffff';
            modal.style.boxShadow = '0 20px 60px rgba(0, 0, 0, 0.35)';

            const header = document.createElement('div');
            header.style.display = 'flex';
            header.style.alignItems = 'center';
            header.style.justifyContent = 'space-between';
            header.style.marginBottom = '12px';

            const title = document.createElement('h3');
            title.textContent = 'Session Files';
            title.style.margin = '0';
            title.style.fontSize = '1rem';

            const closeButton = document.createElement('button');
            closeButton.type = 'button';
            closeButton.textContent = 'Close';
            closeButton.style.backgroundColor = '#7A8499';
            closeButton.style.color = '#ffffff';
            closeButton.style.border = 'none';
            closeButton.style.borderRadius = '999px';
            closeButton.style.padding = '8px 12px';
            closeButton.style.cursor = 'pointer';

            header.appendChild(title);
            header.appendChild(closeButton);
            modal.appendChild(header);

            if (!files.length) {
                const emptyState = document.createElement('p');
                emptyState.textContent = 'No files uploaded for this session.';
                emptyState.style.margin = '0';
                emptyState.style.color = '#A9B4C2';
                modal.appendChild(emptyState);
            } else {
                const list = document.createElement('ul');
                list.style.listStyle = 'none';
                list.style.padding = '0';
                list.style.margin = '0';

                files.forEach((file) => {
                    const item = document.createElement('li');
                    item.style.padding = '10px 12px';
                    item.style.border = '1px solid rgba(255, 255, 255, 0.1)';
                    item.style.borderRadius = '10px';
                    item.style.marginBottom = '8px';
                    item.style.backgroundColor = 'rgba(255, 255, 255, 0.03)';
                    item.style.display = 'flex';
                    item.style.alignItems = 'center';
                    item.style.justifyContent = 'space-between';
                    item.style.gap = '12px';

                    const name = file.original_filename || file.stored_filename || 'Unnamed file';
                    const nameLabel = document.createElement('span');
                    nameLabel.textContent = name;
                    nameLabel.style.wordBreak = 'break-word';

                    const deleteButton = document.createElement('button');
                    deleteButton.type = 'button';
                    deleteButton.textContent = 'x';
                    deleteButton.style.width = '28px';
                    deleteButton.style.height = '28px';
                    deleteButton.style.borderRadius = '50%';
                    deleteButton.style.border = 'none';
                    deleteButton.style.cursor = 'pointer';
                    deleteButton.style.backgroundColor = '#131a36';
                    deleteButton.style.color = '#fbfeff';
                    deleteButton.style.fontWeight = '700';
                    deleteButton.style.flexShrink = '0';

                    const storedFilename = file.stored_filename;
                    if (!storedFilename) {
                        deleteButton.disabled = true;
                        deleteButton.style.opacity = '0.5';
                        deleteButton.style.cursor = 'not-allowed';
                    } else {
                        deleteButton.addEventListener('click', async () => {
                            deleteButton.disabled = true;

                            try {
                                const response = await fetch('/api/session/files', {
                                    method: 'DELETE',
                                    headers: {
                                        'Content-Type': 'application/json',
                                    },
                                    body: JSON.stringify({
                                        session_id: sessionId,
                                        stored_filename: storedFilename,
                                    }),
                                });

                                const result = await response.json();

                                if (!response.ok) {
                                    const message = result.error || 'Failed to delete file.';
                                    notificationContainer.textContent = message;
                                    deleteButton.disabled = false;
                                    return;
                                }

                                item.remove();
                                notificationContainer.textContent = `Deleted: ${name}`;

                                if (list.childElementCount === 0) {
                                    const emptyState = document.createElement('p');
                                    emptyState.textContent = 'No files uploaded for this session.';
                                    emptyState.style.margin = '0';
                                    emptyState.style.color = '#A9B4C2';
                                    modal.appendChild(emptyState);
                                    list.remove();
                                }
                            } catch (error) {
                                notificationContainer.textContent = 'Failed to delete file.';
                                deleteButton.disabled = false;
                            }
                        });
                    }

                    item.appendChild(nameLabel);
                    item.appendChild(deleteButton);

                    list.appendChild(item);
                });

                modal.appendChild(list);
            }

            overlay.appendChild(modal);
            document.body.appendChild(overlay);

            function closeModal() {
                overlay.remove();
            }

            closeButton.addEventListener('click', closeModal);
            overlay.addEventListener('click', (event) => {
                if (event.target === overlay) {
                    closeModal();
                }
            });
        }

        function removeWelcomeMessage() {
            const welcomeMsg = document.getElementById('welcome-message');
            if (welcomeMsg) {
                welcomeMsg.remove();
            }
            
            const promptBox = document.getElementById('suggested-prompts');
            if (promptBox) {
                promptBox.remove();
            }

            firstMessageSent = true;
        }

        function addMessage(content, sender, isTyping = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            if (isTyping && sender === 'assistant') {
                messageDiv.classList.add('typing');
                messageDiv.innerHTML = '<span></span><span></span><span></span>';
            } else {
                messageDiv.textContent = content;
            }
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            return messageDiv;
        }

        function renderAssistantMessage(element, text) {
            const rawHtml = marked.parse(text);
            element.innerHTML = DOMPurify.sanitize(rawHtml);
        }

        let isSending = false;

        function extractDisplayAnswer(answerValue) {
            if (typeof answerValue !== "string") return "No answer returned.";

            const raw = answerValue.trim();
            if (!raw) return "No answer returned.";

            // Remove markdown code fences like ```json ... ```
            const unfenced = raw
                .replace(/^```json\s*/i, "")
                .replace(/^```\s*/i, "")
                .replace(/\s*```$/, "")
                .trim();

            // If model returned JSON text, extract parsed.answer
            try {
                const parsed = JSON.parse(unfenced);
                if (parsed && typeof parsed.answer === "string" && parsed.answer.trim()) {
                    return parsed.answer.trim();
                }
            } catch (e) {
                // Not JSON, fall through
            }

            // Plain text fallback
            return raw;
        }

        async function sendMessage() {
            if (isSending) return;

            const message = messageInput.value.trim();
            if (!message) return;

            isSending = true;
            sendButton.disabled = true;

            // Remove welcome message on first interaction
            if (!firstMessageSent) {
                removeWelcomeMessage();
            }

            addMessage(message, 'user');
            messageInput.value = '';
            updateSendButtonState();

            try {
                // Show typing animation
                const typingElement = addMessage('', 'assistant', true);
                
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message, session_id: sessionId, topic: selectedTopic }),
                });
                const data = await response.json();

                if (data.cached) {
                    console.log("Cache Hit")
                }
                
                // Remove typing element and add typed response
                typingElement.remove();
                const responseElement = addMessage('', 'assistant');
                console.log(message)
                console.log(selectedTopic)
                console.log(data)
                const displayAnswer = extractDisplayAnswer(data.answer);
                renderAssistantMessage(responseElement, displayAnswer);
            } catch (error) {
                const errorElement = addMessage('', 'assistant');
                const displayAnswer = extractDisplayAnswer(data.answer);
                renderAssistantMessage(responseElement, displayAnswer);
            } finally {
                isSending = false;
                sendButton.disabled = false;
                updateSendButtonState();
            }
        }

        async function uploadImage() {
            const file = fileInput.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);
            formData.append('session_id', sessionId);

            try {
                notificationContainer.textContent = `Uploading: ${file.name}...`;

                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData,
                });

                const data = await response.json();

                if (!response.ok) {
                    notificationContainer.textContent = `Upload failed: ${data.error || "Unknown error"}`;
                    return;
                }

                notificationContainer.textContent = `Uploaded: ${data.original_filename}`;
                fileInput.value = '';
            } catch (error) {
                notificationContainer.textContent = 'Upload failed: Network or server error.';
                fileInput.value = '';
            }
        }

        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        // Toggle send button state based on input
        function updateSendButtonState() {
            const hasText = messageInput.value.trim().length > 0;
            if (hasText) {
                sendButton.classList.add('active');
            } else {
                sendButton.classList.remove('active');
            }
        }

        function renderSuggestedPrompts() {
            const promptContainer = document.getElementById('suggested-prompts');
            if (!promptContainer) return;

            const prompts = promptSuggestions[selectedTopic] || [
                `What is ${readableTopic}?`,
                `Why is ${readableTopic} important?`,
                `What are common methods used in ${readableTopic}?`
            ];

            promptContainer.innerHTML = '';

            prompts.forEach((prompt) => {
                const button = document.createElement('button');
                button.className = 'suggested-prompt';
                button.textContent = prompt;

                button.addEventListener('click', () => {
                    messageInput.value = prompt;
                    updateSendButtonState();
                    messageInput.focus();
                });

                promptContainer.appendChild(button);
            });
        }

        // Health check on page load
        async function checkHealth() {
            try {
                const response = await fetch('/api/health')
                const data = await response.json()
                if (data.status == 'ok') {
                    console.log('API is healthy');
                } else {
                    console.log('API health check failed')
                }
            } catch (e) {
                console.log('Error checking health: ', e);
            }
        }

        checkHealth();
        
        messageInput.addEventListener('input', updateSendButtonState);
        messageInput.addEventListener('keyup', updateSendButtonState);
        
        // Initialize button state on page load
        updateSendButtonState();
    </script>
</body>
</html>
